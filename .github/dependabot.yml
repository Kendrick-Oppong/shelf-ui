version: 2
updates:
  # =========================
  # npm dependencies
  # =========================
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "next"
          - "next-themes"
      ui:
        patterns:
          - "radix-ui"
          - "@radix-ui/*"
          - "lucide-react"
          - "clsx"
          - "tailwindcss"
          - "tailwind-merge"
          - "class-variance-authority"
          - "tw-animate-css"
          - "shadcn"
      animation:
        patterns:
          - "framer-motion"
          - "motion"
      dev-tools:
        patterns:
          - "typescript"
          - "@types/node"
          - "@biomejs/biome"
          - "ultracite"
          - "lefthook"
          - "husky"
          - "lint-staged"
          - "@changesets/*"
          - "@commitlint/*"
      misc:
        patterns:
          - "*"
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-patch"]

  # =========================
  # GitHub Actions
  # =========================
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
    groups:
      actions:
        patterns:
          - "*"
