name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check          # Ultracite lint + format check
      - run: pnpm typecheck      # TypeScript
      # - run: pnpm registry:check # Validate registry output

  quality:
    name: quality
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - run: echo "quality gate passed"
